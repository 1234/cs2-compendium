# --- Mouse input -------------------------------------------------------------
m_rawinput 1        # Read mouse directly from hardware driver, bypassing Windows entirely.
                    # CS2 saves this per-user config, but explicit here guarantees it's
                    # always set -- even after a config reset or profile transfer.
#m_mouseaccel1 0    # CS2-internal mouse accel parameter 1. Redundant when m_rawinput 1
                    # is active (raw input bypasses it). Safety net if rawinput is off.
#m_mouseaccel2 0    # CS2-internal mouse accel parameter 2. Same as above.

# --- FPS ---------------------------------------------------------------------
fps_max 0               # Uncapped in-game. Let the hardware run.
fps_max_menu 60         # Cap FPS in menus -- no reason to burn GPU on the main menu.

# --- Network -----------------------------------------------------------------
rate 786432             # Max download rate from server. Correct maximum value.
cl_cmdrate 128          # Ignored in CS2 matchmaking (sub-tick enforces server-side). Kept for local servers.
cl_updaterate 128       # Same as above — no effect on Valve servers, relevant for local servers only.
cl_interp 0             # Interpolation delay -- 0 = let server set the minimum.
cl_interp_ratio 1       # Interpolation ratio. 1 = minimum. Default is 2 (double the delay).

# --- Radar -------------------------------------------------------------------
cl_radar_square_always 0           # Round radar shape.
cl_hud_radar_scale 2               # Radar size. 1 = default, higher = larger.
cl_hud_radar_background_alpha 0.8  # Radar background opacity. 1.0 = fully opaque, 0.0 = invisible.
cl_radar_scale 0.3                 # Zoom level. Lower = more of the map visible at once.
cl_radar_always_centered 0         # 0 = map stays fixed, you move on it. Better map awareness.

# --- Sound -------------------------------------------------------------------
snd_voipvolume 1.3      # Voice chat volume. Default 1.0. Game sounds can drown out teammate
                        # calls -- raise if you struggle to hear comms, lower if voice is too loud.

# --- Sensitivity -------------------------------------------------------------
zoom_sensitivity_ratio_mouse 1.0   # Scoped sens multiplier relative to hip-fire sens.
                                   # 1.0 = identical to normal sens. Default is 1.0 -- set
                                   # explicitly so it's visible and not silently wrong.
                                   # Adjust if AWP/Scout scope feels off.

# --- Crosshair ---------------------------------------------------------------
cl_crosshair_recoil 1   # Crosshair follows recoil visually. Set to 0 for static crosshair.

# --- Viewmodel ---------------------------------------------------------------
viewmodel_fov 68        # Higher = weapon appears smaller and further away, less screen blocked.
viewmodel_offset_x 2.5  # Horizontal position. Positive = further right.
viewmodel_offset_y 2    # Forward/back distance. Positive = slightly closer to center.
viewmodel_offset_z -2   # Vertical position. Negative = lower on screen, more visibility above.

# --- Grenade binds -----------------------------------------------------------
bind v "slot7"          # Flashbang
bind c "slot8"          # Smoke grenade
bind 4 "slot6"          # HE grenade
bind z "slot10"         # Molotov / Incendiary grenade
bind x "slot9"          # Decoy

# --- KZ / Movement servers ---------------------------------------------------
# https://docs.femboy.kz/wiki/cs2/commands/kz
bind "MOUSE5" "say !cp"     # Set checkpoint
bind "MOUSE4" "say !tp"     # Teleport to checkpoint
#bind "x" "say !undo"       # Undo last checkpoint -- conflicts with decoy bind above.
                             # Enable when on KZ servers, disable for normal play.

